<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Image Cropper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #111827;
            color: #e5e7eb;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .main-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            padding: env(safe-area-inset-top, 12px) 0.75rem env(safe-area-inset-bottom, 12px);
            display: flex;
            flex-direction: column;
            max-width: 100vw;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 0;
            flex-shrink: 0;
            gap: 0.5rem;
        }

        .header h1 {
            font-size: 0.85rem;
            font-weight: 500;
            color: #9ca3af;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* Upload Section */
        #upload-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 1.5rem;
        }

        .upload-box {
            background-color: #1f2937;
            border: 2px dashed #374151;
            border-radius: 0.75rem;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .upload-box:hover, .upload-box.drag-over {
            background-color: #1a2538;
            border-color: #3b82f6;
        }

        .upload-icon {
            width: 2.5rem;
            height: 2.5rem;
            margin: 0 auto 0.75rem;
            color: #4b5563;
        }

        .upload-text {
            color: #6b7280;
            font-size: 0.85rem;
        }

        .upload-text span {
            color: #3b82f6;
        }

        .upload-hint {
            color: #4b5563;
            font-size: 0.7rem;
            margin-top: 0.5rem;
        }

        input[type="file"] {
            display: none;
        }

        /* Editor Section */
        #editor-section {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
            gap: 0.25rem;
        }

        /* Settings Bar (aspect ratio + padding color) */
        .settings-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.35rem;
            padding: 0.375rem 0.5rem;
            flex-shrink: 0;
        }

        .setting-group {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.7rem;
            background: #1f2937;
            padding: 0.3rem 0.55rem;
            border-radius: 2rem;
            border: 1px solid #293548;
        }

        .setting-group label {
            color: #9ca3af;
            font-size: 0.6rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-right: 0.1rem;
        }

        .dim-label {
            color: #e5e7eb;
            font-size: 0.7rem;
            cursor: pointer;
            font-variant-numeric: tabular-nums;
            padding: 0.1rem 0.2rem;
            border-radius: 0.2rem;
            transition: background 0.15s;
        }

        .dim-label:hover {
            background: rgba(255,255,255,0.06);
        }

        .dim-label .dim-sub {
            color: #6b7280;
            font-size: 0.55rem;
            margin-left: 0.15rem;
        }

        /* Dimensions Modal */
        .dim-modal {
            background-color: #1f2937;
            border-radius: 0.75rem;
            padding: 1.25rem;
            width: 100%;
            max-width: 260px;
            border: 1px solid #374151;
        }

        .dim-modal h2 {
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.75rem;
            color: #e5e7eb;
        }

        .dim-modal .mode-toggle {
            display: flex;
            background: #111827;
            border-radius: 0.375rem;
            overflow: hidden;
            border: 1px solid #374151;
            margin-bottom: 0.75rem;
        }

        .dim-modal .mode-toggle button {
            flex: 1;
            padding: 0.4rem 0.5rem;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            background: transparent;
            color: #6b7280;
            border: none;
            border-radius: 0;
            cursor: pointer;
            transition: all 0.15s;
        }

        .dim-modal .mode-toggle button.active {
            background: #374151;
            color: #e5e7eb;
        }

        .dim-modal .dim-fields {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 0.75rem;
        }

        .dim-modal .dim-field-input {
            width: 4.5rem;
            background-color: #111827;
            border: 1px solid #374151;
            color: #e5e7eb;
            padding: 0.45rem 0.5rem;
            border-radius: 0.375rem;
            font-size: 0.85rem;
            text-align: center;
            font-family: inherit;
            font-variant-numeric: tabular-nums;
        }

        .dim-modal .dim-field-input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .dim-modal .dim-sep {
            color: #4b5563;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .dim-modal .dim-unit {
            color: #6b7280;
            font-size: 0.7rem;
        }

        .dim-presets {
            width: 100%;
            background-color: #111827;
            border: 1px solid #374151;
            color: #e5e7eb;
            padding: 0.4rem 0.5rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-family: inherit;
            margin-bottom: 0.75rem;
            cursor: pointer;
        }

        .dim-presets:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .color-swatch-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .color-swatch {
            width: 1.3rem;
            height: 1.3rem;
            border-radius: 50%;
            border: 2px solid #4b5563;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.2);
        }

        .color-swatch input[type="color"] {
            position: absolute;
            top: -4px;
            left: -4px;
            width: calc(100% + 8px);
            height: calc(100% + 8px);
            border: none;
            cursor: pointer;
            opacity: 0;
        }

        .color-hex {
            width: 4.2rem;
            background-color: rgba(0,0,0,0.15);
            border: 1px solid #374151;
            color: #e5e7eb;
            padding: 0.25rem 0.3rem;
            border-radius: 0.25rem;
            font-size: 0.65rem;
            font-family: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace;
            text-align: center;
            letter-spacing: 0.02em;
        }

        .color-hex:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .eyedropper-btn {
            background: transparent;
            border: 1px solid #374151;
            color: #6b7280;
            width: 1.5rem;
            height: 1.5rem;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: all 0.15s;
        }

        .eyedropper-btn:hover,
        .eyedropper-btn.active {
            border-color: #3b82f6;
            color: #3b82f6;
        }

        .eyedropper-btn.active {
            background: rgba(59, 130, 246, 0.15);
        }

        .eyedropper-btn svg {
            width: 0.7rem;
            height: 0.7rem;
        }

        #canvas-container.pipette-mode {
            cursor: crosshair;
        }

        /* Canvas Area */
        .canvas-wrapper {
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.25rem;
            overflow: hidden;
        }

        .canvas-wrapper.fit-width {
            overflow-y: auto;
            align-items: flex-start;
            padding-left: 0;
            padding-right: 0;
        }

        .canvas-wrapper.fit-height {
            overflow-x: auto;
            justify-content: flex-start;
            padding-top: 0;
            padding-bottom: 0;
        }

        /* Fit mode toggle */
        .fit-btn {
            padding: 0.2rem 0.4rem;
            font-size: 0.6rem;
            font-weight: 600;
            background: transparent;
            color: #6b7280;
            border: 1px solid transparent;
            border-radius: 0.25rem;
            cursor: pointer;
            transition: all 0.15s;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            line-height: 1;
        }

        .fit-btn:hover {
            color: #9ca3af;
        }

        .fit-btn.active {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
            border-color: rgba(59, 130, 246, 0.3);
        }

        .canvas-container-outer {
            position: relative;
            border-radius: 0.5rem;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            flex-shrink: 0;
            /* width and height set by JS */
        }

        .canvas-aspect-ratio {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .drop-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(59, 130, 246, 0.15);
            border: 2px dashed #3b82f6;
            border-radius: 0.5rem;
            display: none;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 10;
        }

        .drop-overlay.visible {
            display: flex;
        }

        .drop-overlay span {
            color: #3b82f6;
            font-size: 0.8rem;
            font-weight: 500;
            background: rgba(17, 24, 39, 0.85);
            padding: 0.4rem 0.75rem;
            border-radius: 0.375rem;
        }

        /* Controls */
        .controls {
            flex-shrink: 0;
            padding: 0.25rem 0.5rem 0.75rem;
            max-width: 420px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .control-row {
            display: flex;
            gap: 0.5rem;
        }

        .slider-group {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 0.35rem;
            background-color: #1f2937;
            padding: 0.4rem 0.6rem;
            border-radius: 2rem;
        }

        .slider-label {
            color: #6b7280;
            width: 2.25rem;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 3px;
            background: #374151;
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            background: #3b82f6;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: #3b82f6;
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        .slider-value {
            min-width: 2.25rem;
            text-align: right;
            font-size: 0.65rem;
            color: #9ca3af;
            font-variant-numeric: tabular-nums;
            position: relative;
            z-index: 1;
            padding: 0.3rem 0.2rem;
        }

        .help-text {
            font-size: 0.6rem;
            color: #4b5563;
            text-align: center;
        }

        .button-row {
            display: flex;
            gap: 0.375rem;
            align-items: center;
        }

        button {
            border-radius: 0.375rem;
            border: none;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.15s;
            color: white;
        }

        button:hover {
            opacity: 0.85;
        }

        .btn-icon {
            width: 2.25rem;
            height: 2.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #1f2937;
            border: 1px solid #374151;
            border-radius: 50%;
            padding: 0;
            color: #9ca3af;
            flex-shrink: 0;
        }

        .btn-icon:hover {
            border-color: #4b5563;
            color: #e5e7eb;
            opacity: 1;
        }

        .btn-icon svg {
            width: 0.9rem;
            height: 0.9rem;
        }

        .btn-download {
            flex: 1;
            background-color: #3b82f6;
            font-weight: 600;
            padding: 0.6rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            letter-spacing: 0.02em;
        }

        .hidden {
            display: none !important;
        }

        /* Export Dialog */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
            backdrop-filter: blur(4px);
        }

        .modal {
            background-color: #1f2937;
            border-radius: 0.75rem;
            padding: 1.5rem;
            width: 100%;
            max-width: 280px;
            border: 1px solid #374151;
        }

        .modal h2 {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 1rem;
            color: #e5e7eb;
        }

        .dimension-inputs {
            margin-bottom: 0.75rem;
        }

        .input-group {
            margin-bottom: 0.75rem;
        }

        .input-group label {
            display: block;
            font-size: 0.65rem;
            color: #6b7280;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .input-wrapper {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .input-wrapper input {
            flex: 1;
            background-color: #111827;
            border: 1px solid #374151;
            color: #e5e7eb;
            padding: 0.5rem;
            border-radius: 0.375rem;
            font-size: 0.85rem;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .input-wrapper span {
            color: #6b7280;
            font-size: 0.7rem;
            width: 2rem;
        }

        .modal-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .modal-btn {
            flex: 1;
            padding: 0.6rem;
            border-radius: 0.375rem;
            border: none;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.15s;
            color: white;
        }

        .modal-btn:hover {
            opacity: 0.85;
        }

        .modal-cancel {
            background-color: #374151;
        }

        .modal-confirm {
            background-color: #3b82f6;
            font-weight: 600;
        }

        .size-info {
            font-size: 0.65rem;
            color: #10b981;
            text-align: center;
            padding: 0.375rem;
            background-color: #111827;
            border-radius: 0.25rem;
        }

        /* Small height (landscape phones, short windows) */
        @media (max-height: 700px) {
            .header h1 { font-size: 0.75rem; }
            .controls { padding: 0.125rem 0.5rem 0.5rem; gap: 0.25rem; }
            .settings-bar { padding: 0.25rem 0.5rem; }
            .btn-icon { width: 2rem; height: 2rem; }
            .btn-download { padding: 0.45rem 0.75rem; font-size: 0.75rem; }
        }

        /* Narrow screens (small phones) */
        @media (max-width: 360px) {
            .setting-group { padding: 0.3rem 0.45rem; gap: 0.25rem; }
            .color-hex { width: 3.8rem; font-size: 0.6rem; }
            .setting-group label { font-size: 0.55rem; }
        }

        /* Wide screens (desktop) */
        @media (min-width: 768px) {
            .controls {
                max-width: 480px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header">
            <h1>Image Cropper</h1>
        </div>

        <!-- Upload Section -->
        <div id="upload-section">
            <label for="image-upload">
                <div class="upload-box" id="upload-box">
                    <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                    <p class="upload-text">Drop image here or <span>browse</span></p>
                    <p class="upload-hint">Supports JPG, PNG, WebP</p>
                </div>
            </label>
            <input type="file" id="image-upload" accept="image/*">
        </div>

        <!-- Editor Section -->
        <div id="editor-section">
            <!-- Settings Bar -->
            <div class="settings-bar">
                <div class="setting-group" id="dim-trigger" title="Change dimensions">
                    <label>Size</label>
                    <span class="dim-label" id="dim-display">3:4</span>
                </div>
                <div class="setting-group">
                    <label>Fit</label>
                    <button class="fit-btn" id="fit-w-btn" title="Fit to width">W</button>
                    <button class="fit-btn" id="fit-h-btn" title="Fit to height">H</button>
                </div>
                <div class="setting-group">
                    <label>Fill</label>
                    <div class="color-swatch-wrapper">
                        <div class="color-swatch" id="color-swatch">
                            <input type="color" id="color-picker" value="#ffffff">
                        </div>
                        <input type="text" class="color-hex" id="color-hex" value="#ffffff" maxlength="7" spellcheck="false">
                        <button class="eyedropper-btn" id="eyedropper-btn" title="Pick color from image">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M2 22l1-1h3l9-9-4-4-9 9v3l-1 1z"/>
                                <path d="M13 7l3.293-3.293a1 1 0 011.414 0l2.586 2.586a1 1 0 010 1.414L17 11"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Dimensions Modal -->
            <div id="dim-dialog" class="modal-overlay hidden">
                <div class="dim-modal">
                    <h2>Canvas Dimensions</h2>
                    <div class="mode-toggle">
                        <button id="mode-ratio" class="active">Ratio</button>
                        <button id="mode-size">Size</button>
                    </div>
                    <select id="ratio-presets" class="dim-presets">
                        <option value="">Custom</option>
                        <option value="1:1">1:1 — Square</option>
                        <option value="3:2">3:2 — Photo</option>
                        <option value="2:3">2:3 — Photo portrait</option>
                        <option value="4:3">4:3 — Screen</option>
                        <option value="3:4">3:4 — Screen portrait</option>
                        <option value="16:9">16:9 — Widescreen</option>
                        <option value="9:16">9:16 — Widescreen portrait</option>
                        <option value="screen">Screen resolution</option>
                    </select>
                    <div class="dim-fields" id="ratio-fields">
                        <input type="number" class="dim-field-input" id="ratio-w" value="3" min="1" max="9999">
                        <span class="dim-sep">:</span>
                        <input type="number" class="dim-field-input" id="ratio-h" value="4" min="1" max="9999">
                    </div>
                    <div class="dim-fields" id="size-fields" style="display:none;">
                        <input type="number" class="dim-field-input" id="size-w" value="900" min="1" max="9999">
                        <span class="dim-sep">&times;</span>
                        <input type="number" class="dim-field-input" id="size-h" value="1200" min="1" max="9999">
                        <span class="dim-unit">px</span>
                    </div>
                    <div class="modal-actions">
                        <button id="dim-cancel" class="modal-btn modal-cancel">Cancel</button>
                        <button id="dim-apply" class="modal-btn modal-confirm">Apply</button>
                    </div>
                </div>
            </div>

            <div class="canvas-wrapper" id="canvas-wrapper">
                <div class="canvas-container-outer">
                    <div class="canvas-aspect-ratio" id="canvas-aspect">
                        <div id="canvas-container">
                            <canvas id="canvas"></canvas>
                        </div>
                    </div>
                    <div class="drop-overlay" id="drop-overlay">
                        <span>Drop to replace</span>
                    </div>
                </div>
            </div>

            <div class="controls">
                <div class="control-row">
                    <div class="slider-group">
                        <span class="slider-label">Zoom</span>
                        <input type="range" id="zoom-slider" min="0.1" max="3" step="0.01" value="1">
                        <span id="zoom-value" class="slider-value">1.0x</span>
                    </div>
                    <div class="slider-group">
                        <span class="slider-label">Rotate</span>
                        <input type="range" id="rotate-slider" min="-180" max="180" step="1" value="0">
                        <span id="rotate-value" class="slider-value">0</span>
                    </div>
                </div>

                <p class="help-text">Drag to move &middot; Scroll to zoom &middot; Pinch &amp; twist on touch</p>

                <div class="button-row">
                    <button id="new-image-btn" class="btn-icon" title="New image">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
                        </svg>
                    </button>
                    <button id="reset-btn" class="btn-icon" title="Reset position">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 12a9 9 0 1 1 3.4 7"/><polyline points="3 22 3 16 9 16"/>
                        </svg>
                    </button>
                    <button id="download-btn" class="btn-download">Export</button>
                </div>
            </div>
        </div>

        <!-- Export Dialog -->
        <div id="export-dialog" class="modal-overlay hidden">
            <div class="modal">
                <h2>Export Settings</h2>

                <div class="dimension-inputs">
                    <div class="input-group">
                        <label>Width</label>
                        <div class="input-wrapper">
                            <input type="number" id="width-input" min="30" max="9000" value="900">
                            <span>px</span>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Height</label>
                        <div class="input-wrapper">
                            <input type="number" id="height-input" min="40" max="12000" value="1200">
                            <span>px</span>
                        </div>
                    </div>
                </div>

                <div class="size-info" id="size-info">Using original resolution</div>

                <div class="modal-actions">
                    <button id="cancel-export" class="modal-btn modal-cancel">Cancel</button>
                    <button id="confirm-export" class="modal-btn modal-confirm">Export</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const uploadSection = document.getElementById('upload-section');
        const editorSection = document.getElementById('editor-section');
        const imageUpload = document.getElementById('image-upload');
        const uploadBox = document.getElementById('upload-box');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const canvasContainer = document.getElementById('canvas-container');
        const canvasWrapper = document.getElementById('canvas-wrapper');
        const canvasAspectEl = document.getElementById('canvas-aspect');
        const dropOverlay = document.getElementById('drop-overlay');
        const zoomSlider = document.getElementById('zoom-slider');
        const zoomValue = document.getElementById('zoom-value');
        const rotateSlider = document.getElementById('rotate-slider');
        const rotateValue = document.getElementById('rotate-value');
        const resetBtn = document.getElementById('reset-btn');
        const downloadBtn = document.getElementById('download-btn');
        const newImageBtn = document.getElementById('new-image-btn');

        // Dimension controls
        const dimTrigger = document.getElementById('dim-trigger');
        const dimDisplay = document.getElementById('dim-display');
        const dimDialog = document.getElementById('dim-dialog');
        const modeRatioBtn = document.getElementById('mode-ratio');
        const modeSizeBtn = document.getElementById('mode-size');
        const ratioFieldsEl = document.getElementById('ratio-fields');
        const sizeFieldsEl = document.getElementById('size-fields');
        const ratioW = document.getElementById('ratio-w');
        const ratioH = document.getElementById('ratio-h');
        const sizeW = document.getElementById('size-w');
        const sizeH = document.getElementById('size-h');
        const dimCancel = document.getElementById('dim-cancel');
        const dimApply = document.getElementById('dim-apply');

        // Color controls
        const colorPicker = document.getElementById('color-picker');
        const colorSwatch = document.getElementById('color-swatch');
        const colorHex = document.getElementById('color-hex');
        const eyedropperBtn = document.getElementById('eyedropper-btn');

        // Export dialog
        const exportDialog = document.getElementById('export-dialog');
        const widthInput = document.getElementById('width-input');
        const heightInput = document.getElementById('height-input');
        const sizeInfo = document.getElementById('size-info');
        const cancelExport = document.getElementById('cancel-export');
        const confirmExport = document.getElementById('confirm-export');

        let img = null;
        let imgX = 0, imgY = 0, imgScale = 1, imgRotation = 0;
        let isDragging = false;
        let startX = 0, startY = 0;
        let initialDistance = 0, initialScale = 1;
        let initialRotation = 0, initialAngle = 0;
        let optimalWidth = 900, optimalHeight = 1200;
        let bgColor = '#ffffff';
        let aspectW = screen.width, aspectH = screen.height;
        let sizeMode = 'ratio'; // 'ratio' or 'size'
        let pipetteActive = false;
        let fitMode = 'contain'; // 'contain', 'width', 'height'

        // Fit mode controls
        const fitWBtn = document.getElementById('fit-w-btn');
        const fitHBtn = document.getElementById('fit-h-btn');

        // ----- Dimensions modal -----
        function updateDimDisplay() {
            if (sizeMode === 'ratio') {
                dimDisplay.innerHTML = aspectW + ':' + aspectH;
            } else {
                dimDisplay.innerHTML = aspectW + '&times;' + aspectH + '<span class="dim-sub">px</span>';
            }
        }
        // Set defaults from screen size
        ratioW.value = aspectW;
        ratioH.value = aspectH;
        updateDimDisplay();

        function syncPresetDropdown() {
            const key = ratioW.value + ':' + ratioH.value;
            const screenKey = screen.width + ':' + screen.height;
            if (key === screenKey) {
                ratioPresets.value = 'screen';
            } else {
                const match = Array.from(ratioPresets.options).find(o => o.value === key);
                ratioPresets.value = match ? key : '';
            }
        }

        dimTrigger.addEventListener('click', () => {
            // Sync modal fields with current state
            if (sizeMode === 'ratio') {
                modeRatioBtn.classList.add('active');
                modeSizeBtn.classList.remove('active');
                ratioFieldsEl.style.display = '';
                sizeFieldsEl.style.display = 'none';
                ratioPresets.style.display = '';
                ratioW.value = aspectW;
                ratioH.value = aspectH;
                syncPresetDropdown();
            } else {
                modeSizeBtn.classList.add('active');
                modeRatioBtn.classList.remove('active');
                ratioFieldsEl.style.display = 'none';
                sizeFieldsEl.style.display = '';
                ratioPresets.style.display = 'none';
                sizeW.value = aspectW;
                sizeH.value = aspectH;
            }
            dimDialog.classList.remove('hidden');
        });

        modeRatioBtn.addEventListener('click', () => {
            modeRatioBtn.classList.add('active');
            modeSizeBtn.classList.remove('active');
            ratioFieldsEl.style.display = '';
            sizeFieldsEl.style.display = 'none';
            ratioPresets.style.display = '';
        });

        modeSizeBtn.addEventListener('click', () => {
            modeSizeBtn.classList.add('active');
            modeRatioBtn.classList.remove('active');
            ratioFieldsEl.style.display = 'none';
            sizeFieldsEl.style.display = '';
            ratioPresets.style.display = 'none';
        });

        const ratioPresets = document.getElementById('ratio-presets');
        ratioPresets.addEventListener('change', () => {
            const val = ratioPresets.value;
            if (!val) return;
            let w, h;
            if (val === 'screen') {
                w = screen.width;
                h = screen.height;
            } else {
                [w, h] = val.split(':').map(Number);
            }
            ratioW.value = w;
            ratioH.value = h;
        });

        // Reset preset to Custom when manually editing ratio inputs
        ratioW.addEventListener('input', () => syncPresetDropdown());
        ratioH.addEventListener('input', () => syncPresetDropdown());

        dimCancel.addEventListener('click', () => dimDialog.classList.add('hidden'));
        dimDialog.addEventListener('click', (e) => {
            if (e.target === dimDialog) dimDialog.classList.add('hidden');
        });

        dimApply.addEventListener('click', () => {
            if (modeRatioBtn.classList.contains('active')) {
                sizeMode = 'ratio';
                aspectW = Math.max(1, parseInt(ratioW.value) || 3);
                aspectH = Math.max(1, parseInt(ratioH.value) || 4);
            } else {
                sizeMode = 'size';
                aspectW = Math.max(1, parseInt(sizeW.value) || 900);
                aspectH = Math.max(1, parseInt(sizeH.value) || 1200);
            }
            updateDimDisplay();
            resizeCanvasContainer();
            if (img) {
                setupCanvas();
                initializeImage();
            }
            dimDialog.classList.add('hidden');
        });

        // ----- Fit mode -----
        function resizeCanvasContainer() {
            const wrapperRect = canvasWrapper.getBoundingClientRect();
            const styles = getComputedStyle(canvasWrapper);
            const padL = parseFloat(styles.paddingLeft) || 0;
            const padR = parseFloat(styles.paddingRight) || 0;
            const padT = parseFloat(styles.paddingTop) || 0;
            const padB = parseFloat(styles.paddingBottom) || 0;
            const availW = wrapperRect.width - padL - padR;
            const availH = wrapperRect.height - padT - padB;
            const ratio = aspectW / aspectH;

            const outer = document.querySelector('.canvas-container-outer');
            let containerW, containerH;

            if (fitMode === 'width') {
                containerW = availW;
                containerH = containerW / ratio;
            } else if (fitMode === 'height') {
                containerH = availH;
                containerW = containerH * ratio;
            } else {
                // contain: fit both dimensions
                containerW = availW;
                containerH = containerW / ratio;
                if (containerH > availH) {
                    containerH = availH;
                    containerW = containerH * ratio;
                }
            }

            outer.style.width = Math.round(containerW) + 'px';
            outer.style.height = Math.round(containerH) + 'px';
        }

        fitWBtn.addEventListener('click', () => {
            if (fitMode === 'width') {
                fitMode = 'contain';
                fitWBtn.classList.remove('active');
            } else {
                fitMode = 'width';
                fitWBtn.classList.add('active');
                fitHBtn.classList.remove('active');
            }
            updateFitMode();
        });

        fitHBtn.addEventListener('click', () => {
            if (fitMode === 'height') {
                fitMode = 'contain';
                fitHBtn.classList.remove('active');
            } else {
                fitMode = 'height';
                fitHBtn.classList.add('active');
                fitWBtn.classList.remove('active');
            }
            updateFitMode();
        });

        function updateFitMode() {
            canvasWrapper.classList.remove('fit-width', 'fit-height');
            if (fitMode === 'width') canvasWrapper.classList.add('fit-width');
            if (fitMode === 'height') canvasWrapper.classList.add('fit-height');

            const oldW = canvas.displayWidth || 1;
            const oldH = canvas.displayHeight || 1;
            resizeCanvasContainer();
            if (img) {
                setupCanvas();
                // Scale image position proportionally to new canvas size
                imgX *= canvas.displayWidth / oldW;
                imgY *= canvas.displayHeight / oldH;
                draw();
            }
        }

        // ----- Aspect ratio -----
        function getAspectRatio() {
            return aspectW / aspectH;
        }

        // ----- Background color -----
        function updateBgColor(hex) {
            if (!/^#[0-9a-fA-F]{6}$/.test(hex)) return;
            bgColor = hex;
            colorPicker.value = hex;
            colorSwatch.style.backgroundColor = hex;
            colorHex.value = hex;
            draw();
        }

        colorPicker.addEventListener('input', (e) => updateBgColor(e.target.value));
        colorHex.addEventListener('change', () => updateBgColor(colorHex.value));
        colorSwatch.style.backgroundColor = bgColor;

        // ----- Pipette (pick from canvas) -----
        function togglePipette() {
            pipetteActive = !pipetteActive;
            eyedropperBtn.classList.toggle('active', pipetteActive);
            canvasContainer.classList.toggle('pipette-mode', pipetteActive);
        }

        eyedropperBtn.addEventListener('click', togglePipette);

        function pickColorFromCanvas(e) {
            if (!pipetteActive) return;
            e.preventDefault();
            e.stopPropagation();
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            let cx, cy;
            if (e.touches) {
                cx = (e.touches[0].clientX - rect.left) * dpr;
                cy = (e.touches[0].clientY - rect.top) * dpr;
            } else {
                cx = (e.clientX - rect.left) * dpr;
                cy = (e.clientY - rect.top) * dpr;
            }
            const pixel = ctx.getImageData(cx, cy, 1, 1).data;
            const hex = '#' + [pixel[0], pixel[1], pixel[2]].map(v => v.toString(16).padStart(2, '0')).join('');
            updateBgColor(hex);
            // Deactivate pipette after pick
            pipetteActive = false;
            eyedropperBtn.classList.remove('active');
            canvasContainer.classList.remove('pipette-mode');
        }

        // ----- Canvas setup -----
        function setupCanvas() {
            const rect = canvasContainer.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            ctx.scale(dpr, dpr);
            canvas.displayWidth = rect.width;
            canvas.displayHeight = rect.height;
        }

        // ----- Load image from file -----
        function loadImageFile(file) {
            if (!file || !file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                img = new Image();
                img.onload = () => {
                    showEditor();
                    setTimeout(() => {
                        resizeCanvasContainer();
                        setupCanvas();
                        initializeImage();
                    }, 50);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // File input
        imageUpload.addEventListener('change', (e) => {
            if (e.target.files[0]) loadImageFile(e.target.files[0]);
        });

        // ----- Drag & drop on upload area -----
        uploadBox.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadBox.classList.add('drag-over');
        });
        uploadBox.addEventListener('dragleave', () => {
            uploadBox.classList.remove('drag-over');
        });
        uploadBox.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadBox.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file) loadImageFile(file);
        });

        // ----- Drag & drop on canvas (replace image) -----
        let dragCounter = 0;
        canvasWrapper.addEventListener('dragenter', (e) => {
            e.preventDefault();
            dragCounter++;
            dropOverlay.classList.add('visible');
        });
        canvasWrapper.addEventListener('dragover', (e) => {
            e.preventDefault();
        });
        canvasWrapper.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dragCounter--;
            if (dragCounter <= 0) {
                dragCounter = 0;
                dropOverlay.classList.remove('visible');
            }
        });
        canvasWrapper.addEventListener('drop', (e) => {
            e.preventDefault();
            dragCounter = 0;
            dropOverlay.classList.remove('visible');
            const file = e.dataTransfer.files[0];
            if (file) loadImageFile(file);
        });

        // ----- Initialize image -----
        function initializeImage() {
            if (!img || !canvas.displayWidth) return;

            const canvasAspect = canvas.displayWidth / canvas.displayHeight;
            const imgAspect = img.width / img.height;

            // Scale to cover canvas
            if (imgAspect > canvasAspect) {
                imgScale = canvas.displayHeight / img.height;
            } else {
                imgScale = canvas.displayWidth / img.width;
            }
            imgScale = Math.max(imgScale, Math.max(
                canvas.displayWidth / img.width,
                canvas.displayHeight / img.height
            ));

            imgX = canvas.displayWidth / 2;
            imgY = canvas.displayHeight / 2;
            imgRotation = 0;

            zoomSlider.value = imgScale;
            zoomValue.textContent = imgScale.toFixed(1) + 'x';
            rotateSlider.value = 0;
            rotateValue.textContent = '0';
            draw();
        }

        // ----- Draw -----
        function draw() {
            if (!canvas.displayWidth || !canvas.displayHeight) return;
            ctx.clearRect(0, 0, canvas.displayWidth, canvas.displayHeight);
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.displayWidth, canvas.displayHeight);

            if (img) {
                ctx.save();
                ctx.translate(imgX, imgY);
                ctx.rotate(imgRotation * Math.PI / 180);
                ctx.drawImage(
                    img,
                    -img.width * imgScale / 2,
                    -img.height * imgScale / 2,
                    img.width * imgScale,
                    img.height * imgScale
                );
                ctx.restore();
            }
        }

        // ----- Touch helpers -----
        function getTouchAngle(t1, t2) {
            return Math.atan2(t2.clientY - t1.clientY, t2.clientX - t1.clientX) * 180 / Math.PI;
        }
        function getTouchDistance(t1, t2) {
            const dx = t2.clientX - t1.clientX;
            const dy = t2.clientY - t1.clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }
        function getEventPos(e) {
            const rect = canvasContainer.getBoundingClientRect();
            if (e.touches) {
                return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
            }
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        // ----- Touch events -----
        canvasContainer.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (pipetteActive && e.touches.length === 1) {
                pickColorFromCanvas(e);
                return;
            }
            if (e.touches.length === 1) {
                isDragging = true;
                const pos = getEventPos(e);
                startX = pos.x - imgX;
                startY = pos.y - imgY;
            } else if (e.touches.length === 2) {
                isDragging = false;
                initialDistance = getTouchDistance(e.touches[0], e.touches[1]);
                initialScale = imgScale;
                initialAngle = getTouchAngle(e.touches[0], e.touches[1]);
                initialRotation = imgRotation;
            }
        });

        canvasContainer.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length === 1 && isDragging) {
                const pos = getEventPos(e);
                imgX = pos.x - startX;
                imgY = pos.y - startY;
                draw();
            } else if (e.touches.length === 2) {
                const dist = getTouchDistance(e.touches[0], e.touches[1]);
                imgScale = Math.max(0.1, Math.min(3, (dist / initialDistance) * initialScale));
                const angle = getTouchAngle(e.touches[0], e.touches[1]);
                let diff = angle - initialAngle;
                if (diff > 180) diff -= 360;
                if (diff < -180) diff += 360;
                imgRotation = initialRotation + diff;
                if (imgRotation > 180) imgRotation -= 360;
                if (imgRotation < -180) imgRotation += 360;
                zoomSlider.value = imgScale;
                zoomValue.textContent = imgScale.toFixed(1) + 'x';
                rotateSlider.value = imgRotation;
                rotateValue.textContent = Math.round(imgRotation) + '\u00B0';
                draw();
            }
        });

        canvasContainer.addEventListener('touchend', (e) => {
            e.preventDefault();
            isDragging = false;
        });

        // ----- Mouse events -----
        canvasContainer.addEventListener('mousedown', (e) => {
            if (pipetteActive) {
                pickColorFromCanvas(e);
                return;
            }
            isDragging = true;
            const pos = getEventPos(e);
            startX = pos.x - imgX;
            startY = pos.y - imgY;
        });
        canvasContainer.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const pos = getEventPos(e);
                imgX = pos.x - startX;
                imgY = pos.y - startY;
                draw();
            }
        });
        canvasContainer.addEventListener('mouseup', () => isDragging = false);
        canvasContainer.addEventListener('mouseleave', () => isDragging = false);

        // Mouse wheel zoom
        canvasContainer.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.95 : 1.05;
            imgScale = Math.max(0.1, Math.min(3, imgScale * delta));
            zoomSlider.value = imgScale;
            zoomValue.textContent = imgScale.toFixed(1) + 'x';
            draw();
        });

        // Sliders
        zoomSlider.addEventListener('input', (e) => {
            imgScale = parseFloat(e.target.value);
            zoomValue.textContent = imgScale.toFixed(1) + 'x';
            draw();
        });
        rotateSlider.addEventListener('input', (e) => {
            imgRotation = parseFloat(e.target.value);
            rotateValue.textContent = Math.round(imgRotation) + '\u00B0';
            draw();
        });

        // Reset zoom/rotate by clicking their value text
        zoomValue.addEventListener('click', () => {
            if (!img || !canvas.displayWidth) return;
            imgScale = Math.max(
                canvas.displayWidth / img.width,
                canvas.displayHeight / img.height
            );
            zoomSlider.value = imgScale;
            zoomValue.textContent = imgScale.toFixed(1) + 'x';
            draw();
        });
        rotateValue.addEventListener('click', () => {
            imgRotation = 0;
            rotateSlider.value = 0;
            rotateValue.textContent = '0';
            draw();
        });

        // Reset
        resetBtn.addEventListener('click', initializeImage);

        // ----- Export -----
        function calculateOptimalDimensions() {
            if (!img) return { width: 900, height: 1200 };
            const ratio = getAspectRatio();
            const visW = canvas.displayWidth / imgScale;
            const visH = canvas.displayHeight / imgScale;
            const visAspect = visW / visH;
            let outW, outH;
            if (visAspect > ratio) {
                outH = Math.min(visH, img.height);
                outW = Math.round(outH * ratio);
            } else {
                outW = Math.min(visW, img.width);
                outH = Math.round(outW / ratio);
            }
            if (outW < 300) { outW = 300; outH = Math.round(300 / ratio); }
            outW = Math.round(outW / 2) * 2;
            outH = Math.round(outH / 2) * 2;
            return { width: outW, height: outH };
        }

        function updateDimensions(source) {
            const ratio = getAspectRatio();
            let w, h;
            if (source === 'width') {
                w = parseInt(widthInput.value) || 900;
                h = Math.round(w / ratio);
                heightInput.value = h;
            } else {
                h = parseInt(heightInput.value) || 1200;
                w = Math.round(h * ratio);
                widthInput.value = w;
            }
            if (Math.abs(w - optimalWidth) < 2 && Math.abs(h - optimalHeight) < 2) {
                sizeInfo.textContent = 'Using original resolution';
                sizeInfo.style.color = '#10b981';
            } else if (w < optimalWidth) {
                sizeInfo.textContent = 'Downscaling from ' + optimalWidth + '\u00D7' + optimalHeight;
                sizeInfo.style.color = '#f59e0b';
            } else {
                sizeInfo.textContent = 'Upscaling from ' + optimalWidth + '\u00D7' + optimalHeight;
                sizeInfo.style.color = '#f59e0b';
            }
        }

        widthInput.addEventListener('input', () => updateDimensions('width'));
        heightInput.addEventListener('input', () => updateDimensions('height'));

        downloadBtn.addEventListener('click', () => {
            if (!img) return;
            if (sizeMode === 'size') {
                optimalWidth = aspectW;
                optimalHeight = aspectH;
                widthInput.value = aspectW;
                heightInput.value = aspectH;
                sizeInfo.textContent = 'Using specified dimensions';
                sizeInfo.style.color = '#10b981';
            } else {
                const opt = calculateOptimalDimensions();
                optimalWidth = opt.width;
                optimalHeight = opt.height;
                widthInput.value = optimalWidth;
                heightInput.value = optimalHeight;
                sizeInfo.textContent = 'Using original resolution';
                sizeInfo.style.color = '#10b981';
            }
            exportDialog.classList.remove('hidden');
        });

        cancelExport.addEventListener('click', () => exportDialog.classList.add('hidden'));
        exportDialog.addEventListener('click', (e) => {
            if (e.target === exportDialog) exportDialog.classList.add('hidden');
        });

        confirmExport.addEventListener('click', () => {
            if (!img) return;
            const outW = parseInt(widthInput.value) || optimalWidth;
            const outH = parseInt(heightInput.value) || optimalHeight;
            const outCanvas = document.createElement('canvas');
            const outCtx = outCanvas.getContext('2d');
            outCanvas.width = outW;
            outCanvas.height = outH;
            const sf = outW / canvas.displayWidth;
            outCtx.fillStyle = bgColor;
            outCtx.fillRect(0, 0, outW, outH);
            outCtx.save();
            outCtx.translate(imgX * sf, imgY * sf);
            outCtx.rotate(imgRotation * Math.PI / 180);
            outCtx.drawImage(
                img,
                -img.width * imgScale * sf / 2,
                -img.height * imgScale * sf / 2,
                img.width * imgScale * sf,
                img.height * imgScale * sf
            );
            outCtx.restore();
            outCanvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'crop-' + outW + 'x' + outH + '.jpg';
                a.click();
                URL.revokeObjectURL(url);
            }, 'image/jpeg', 0.95);
            exportDialog.classList.add('hidden');
        });

        // New image — open file picker, keep current image if cancelled
        newImageBtn.addEventListener('click', () => {
            imageUpload.value = '';
            imageUpload.click();
        });

        // Show/hide
        function showEditor() {
            uploadSection.classList.add('hidden');
            editorSection.classList.remove('hidden');
            editorSection.style.display = 'flex';
        }
        function showUpload() {
            uploadSection.classList.remove('hidden');
            uploadSection.style.display = 'flex';
            editorSection.classList.add('hidden');
        }

        // Resize handling — preserve image position relative to canvas
        function handleResize() {
            if (img && !editorSection.classList.contains('hidden')) {
                const oldW = canvas.displayWidth || 1;
                const oldH = canvas.displayHeight || 1;
                resizeCanvasContainer();
                setupCanvas();
                imgX *= canvas.displayWidth / oldW;
                imgY *= canvas.displayHeight / oldH;
                draw();
            }
        }
        window.addEventListener('resize', handleResize);
        window.addEventListener('orientationchange', () => {
            setTimeout(handleResize, 100);
        });

        // Prevent page scroll on canvas
        document.addEventListener('touchmove', (e) => {
            if (e.target === canvas || canvasContainer.contains(e.target)) {
                e.preventDefault();
            }
        }, { passive: false });

        // Also support dropping on the full page when upload is visible
        document.body.addEventListener('dragover', (e) => e.preventDefault());
        document.body.addEventListener('drop', (e) => {
            e.preventDefault();
            if (!editorSection.classList.contains('hidden')) return;
            const file = e.dataTransfer.files[0];
            if (file) loadImageFile(file);
        });
    </script>
</body>
</html>
